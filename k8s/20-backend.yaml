# =============================================================================
# Services backend (sans frontal web). Un Deployment + un Service chacun.
# Image = une image PAR SERVICE (à construire/publier par la CI, cf. README).
# Chaque pod reçoit la config partagée (hosts + app + secrets) via envFrom.
#
# replicas: 1 partout pour démarrer (certains services ont un état dans redis/mongo
# ou des hypothèses single-instance ; on scalera après validation).
# =============================================================================

# ----------------------------- filestore (3009) ------------------------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: filestore, namespace: overleaf }
spec:
  replicas: 1
  selector: { matchLabels: { app: filestore } }
  template:
    metadata: { labels: { app: filestore } }
    spec:
      containers:
        - name: filestore
          image: ghcr.io/theelse2098/overleaf-artishow-filestore:k8s
          imagePullPolicy: Always
          ports: [{ containerPort: 3009 }]
          envFrom:
            - configMapRef: { name: overleaf-hosts }
            - configMapRef: { name: overleaf-app }
            - secretRef: { name: overleaf-secrets }
          volumeMounts:
            - { name: data, mountPath: /var/lib/overleaf/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: overleaf-data }
---
apiVersion: v1
kind: Service
metadata: { name: filestore, namespace: overleaf }
spec:
  selector: { app: filestore }
  ports: [{ port: 3009, targetPort: 3009 }]
---
