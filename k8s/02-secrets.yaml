# =============================================================================
# Secrets partagés.
# ⚠️ NE PAS committer de vraies valeurs en clair dans un vrai déploiement :
#    ici les valeurs sont des PLACEHOLDERS à remplacer.
#
# - OVERLEAF_INVITE_TOKEN_SECRET / OVERLEAF_SESSION_SECRET : récupère-les depuis
#   overleaf-toolkit/config/variables.env (générés par `bin/init`).
# - WEB_API_PASSWORD : secret d'auth interne entre services Overleaf.
# - GIT_SERVICE_SECRET : secret partagé entre web et le service git (doit être
#   IDENTIQUE des deux côtés). Par défaut le service git retombe sur WEB_API_PASSWORD.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: overleaf-secrets
  namespace: overleaf
type: Opaque
stringData:
  OVERLEAF_SESSION_SECRET: "CHANGE_ME_session"
  OVERLEAF_INVITE_TOKEN_SECRET: "CHANGE_ME_invite"
  WEB_API_USER: "overleaf"
  WEB_API_PASSWORD: "CHANGE_ME_web_api"
  GIT_SERVICE_SECRET: "CHANGE_ME_web_api"
