# =============================================================================
# Point d'entrée unique d'Overleaf, exposé sur le PORT 8080 DE LA VM (hostPort).
# Reproduit le nginx du monolithe (overleaf.conf + clsi-nginx.conf) en un seul pod :
#   /socket.io                         → real-time (websockets)
#   /project/.../output|content/...    → fichiers PDF/sorties servis depuis le
#                                        volume partagé /var/lib/overleaf/data/output
#   /                                  → web
#
# C'est ce 8080 que ton proxy externe (devant la VM) doit consommer.
# Mets OVERLEAF_SITE_URL (01-config.yaml) = l'URL publique servie par ton proxy.
#
# Alternative : 30-ingress.yaml (si tu préfères un contrôleur ingress). N'utilise
# qu'UN SEUL des deux.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: overleaf-proxy-nginx
  namespace: overleaf
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      client_max_body_size 50m;

      types {
        text/plain log blg aux stdout stderr;
        application/pdf pdf;
      }

      # Websockets de l'éditeur → real-time
      location /socket.io {
        proxy_pass http://real-time:3026;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
      }

      # Fichiers de sortie/PDF servis directement depuis le volume partagé
      # (équivalent clsi-nginx). utilisateur connecté :
      location ~ ^/project/([0-9a-f]+)/user/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ {
        rewrite ^/project/([0-9a-f]+)/user/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ /$4 break;
        root /var/lib/overleaf/data/output/$1-$2/generated-files/$3/;
      }
      # anonyme :
      location ~ ^/project/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ {
        rewrite ^/project/([0-9a-f]+)/build/([0-9a-f-]+)/output/(.+)$ /$3 break;
        root /var/lib/overleaf/data/output/$1/generated-files/$2/;
      }
      # PDF range (connecté) :
      location ~ ^/project/([0-9a-f]+)/user/([0-9a-f]+)/content/([0-9a-f-]+/[0-9a-f]+)$ {
        expires 1d;
        alias /var/lib/overleaf/data/output/$1-$2/content/$3;
      }
      # PDF range (anonyme) :
      location ~ ^/project/([0-9a-f]+)/content/([0-9a-f-]+/[0-9a-f]+)$ {
        expires 1d;
        alias /var/lib/overleaf/data/output/$1/content/$2;
      }

      # Bloquer l'accès externe aux métriques et health checks
      location ~* ^/metrics/?$ { return 404; }
      location ~* ^/health_check { return 404; }

      # Tout le reste → web
      location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: overleaf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
              hostPort: 8080          # ← bind le port 8080 de la VM
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
            - name: data
              mountPath: /var/lib/overleaf/data
              readOnly: true
      volumes:
        - name: conf
          configMap:
            name: overleaf-proxy-nginx
        - name: data
          persistentVolumeClaim:
            claimName: overleaf-data
---
# Service interne (pratique pour un port-forward de test : svc/proxy 8080:8080)
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: overleaf
spec:
  selector:
    app: proxy
  ports:
    - port: 8080
      targetPort: 8080
